<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            background-color: #f4f5f7;
            color: #172b4d;
        }
        h3 { margin-top: 0; color: #0747a6; display: flex; align-items: center; justify-content: space-between; }
        .btn {
            background-color: #0052cc;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0065ff; }
        .btn-secondary { background-color: #42526e; }
        .btn-secondary:hover { background-color: #6b778c; }
        .btn-success { background-color: #00875a; }
        .btn-success:hover { background-color: #36b37e; }
        
        #chat-box {
            height: 340px;
            border: 1px solid #dfe1e6;
            background: white;
            padding: 10px;
            overflow-y: auto;
            border-radius: 3px;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .input-group { display: flex; gap: 6px; margin-bottom: 12px; }
        #user-input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #dfe1e6;
            border-radius: 3px;
        }
        .toolbox {
            border-top: 2px dashed #dfe1e6;
            padding-top: 10px;
            margin-top: 10px;
        }
        .toolbox-title { font-size: 11px; font-weight: bold; color: #6b778c; text-transform: uppercase; margin-bottom: 6px; }
    </style>
</head>
<body>

    <h3>Jira Bug AI extension</h3>
    
    <button id="sync-btn" class="btn btn-secondary">🔄 Force Sync Tab Context</button>
    
    <div id="chat-box">
        <em>Awaiting connection... Press Force Sync if frozen.</em>
    </div>

    <div class="input-group">
        <input type="text" id="user-input" placeholder="Ask anything about this bug..." />
        <button id="send-btn" class="btn" style="width: auto; margin-bottom: 0;">Send</button>
    </div>

    <!-- REFINED ADVISORY TOOLBOX -->
    <div class="toolbox">
        <div class="toolbox-title">QA Strategy</div>
        <button id="next-step-btn" class="btn btn-success">⏭️ Suggest Next Step</button>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
